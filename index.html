<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EZ Budget</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
	<link rel="manifest" href="manifest.json">
	<link rel="apple-touch-icon" href="icon.png">
	<meta name="apple-mobile-web-app-capable" content="yes">
	<meta name="apple-mobile-web-app-status-bar-style" content="default">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg: #f5f3ee;
            --surface: #ffffff;
            --surface-alt: #faf9f7;
            --border: #e5e2db;
            --border-light: #edebe5;
            --text: #1a1a1a;
            --text-sub: #808080;
            --accent: #3d3d3d;
            --accent-today: rgba(231, 255, 232, 0.911);
            --accent-soft: rgba(255, 220, 239, 0.911);
            
            /* --accent-soft: rgba(61,61,61,0.06); */
            --accent-hover: #2a2a2a;
            --danger: #c0392b;
            --danger-soft: rgba(192,57,43,0.07);
            --green: #27764e;
            --amber: #b8860b;
            --shadow-sm: 0 1px 3px rgba(0,0,0,0.04);
            --shadow: 0 2px 12px rgba(0,0,0,0.05);
            --shadow-lg: 0 12px 40px rgba(0,0,0,0.08);
            --radius: 18px;
            --radius-sm: 12px;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            min-height: 100vh;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .app {
            max-width: 1080px;
            margin: 0 auto;
            padding: 60px 28px 80px;
        }

        /* ── Header ── */
        .header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 48px;
            padding-top: 8px;
        }

        .logo {
            font-size: 1.6rem;
            font-weight: 800;
            letter-spacing: -0.8px;
            color: var(--accent);
            text-align: center;
        }

        .hamburger {
            position: absolute;
            right: 0;
            width: 48px;
            height: 48px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 5px;
            transition: all 0.2s;
            box-shadow: var(--shadow-sm);
        }

        .hamburger:hover {
            box-shadow: var(--shadow);
            border-color: var(--accent);
        }

        .hamburger span {
            display: block;
            width: 18px;
            height: 1.8px;
            background: var(--text);
            border-radius: 2px;
            transition: all 0.3s;
        }

        .hamburger.open span:nth-child(1) { transform: rotate(45deg) translate(5px, 5px); }
        .hamburger.open span:nth-child(2) { opacity: 0; }
        .hamburger.open span:nth-child(3) { transform: rotate(-45deg) translate(5px, -5px); }

        /* ── Settings ── */
        .settings-panel {
            max-height: 0;
            overflow: hidden;
            transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s, margin 0.3s;
            opacity: 0;
            margin-bottom: 0;
        }

        .settings-panel.open {
            max-height: 200px;
            opacity: 1;
            margin-bottom: 36px;
        }

        .settings-inner {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 32px;
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
        }

        .field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .field input {
            width: 100%;
            min-width: 0;
            max-width: 100%;
            padding: 13px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            background: var(--surface-alt);
            transition: border-color 0.2s, box-shadow 0.2s;
            color: var(--text);
        }

        .field input[type="date"] {
            -webkit-appearance: none;
            appearance: none;
        }

        .field input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px var(--accent-soft);
            background: var(--surface);
        }

        /* ── Summary ── */
        .summary-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 18px;
            margin-bottom: 36px;
        }

        .stat-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 28px 24px;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
        }

        .stat-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 1.65rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }

        .stat-value.accent { color: var(--accent); }
        .stat-value.amber { color: var(--amber); }
        .stat-value.green { color: var(--green); }
        .stat-value.red { color: var(--danger); }

        .progress-wrap {
            margin-top: 18px;
            height: 5px;
            background: var(--border-light);
            border-radius: 100px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            border-radius: 100px;
            background: var(--accent);
            transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .progress-fill.over { background: var(--danger); }

        /* ── Calendar ── */
        .calendar-section {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .cal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px 28px;
            border-bottom: 1px solid var(--border-light);
        }

        .cal-title {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.3px;
        }

        .cal-nav {
            display: flex;
            gap: 8px;
        }

        .cal-nav button {
            width: 40px;
            height: 40px;
            border-radius: var(--radius-sm);
            border: 1.5px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text);
            transition: all 0.15s;
        }

        .cal-nav button:hover {
            background: var(--accent-soft);
            border-color: var(--accent);
            color: var(--accent);
        }

        .cal-nav .today-btn {
            width: auto;
            padding: 0 16px;
            font-size: 0.78rem;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        .cal-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .cal-day-label {
            padding: 14px 0;
            text-align: center;
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }

        .cal-day {
            min-height: 110px;
            border-top: 1px solid var(--border-light);
            border-right: 1px solid var(--border-light);
            padding: 10px 12px;
            cursor: pointer;
            transition: background 0.15s;
        }

        .cal-day:nth-child(7n) { border-right: none; }
        .cal-day:hover { background: var(--accent-soft); }
        .cal-day.other-month { background: var(--surface-alt); }
        .cal-day.other-month .day-num { color: #ccc; }
        /*.cal-day.today { background: var(--accent-soft); }*/
        .cal-day.today { background: var(--accent-today); }
        .cal-day.selected { box-shadow: inset 0 0 0 2.5px var(--accent); border-radius: 4px; }

        .day-num {
            font-size: 0.88rem;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text);
        }

        .day-total {
            font-size: 0.68rem;
            font-weight: 700;
            color: var(--amber);
            margin-bottom: 6px;
        }

        .day-chips {
            display: flex;
            flex-direction: column;
            gap: 3px;
        }

        .day-chip {
            font-size: 0.65rem;
            padding: 4px 8px;
            border-radius: 8px;
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
            transition: all 0.15s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }

        .day-chip:hover { background: rgba(61,61,61,0.1); }

        /* .day-chip .chip-del {
            display: none;
            color: var(--danger);
            font-weight: 800;
            font-size: 0.75rem;
        }

        .day-chip:hover .chip-del { display: inline; } */

        .day-more {
            font-size: 0.6rem;
            color: var(--text-sub);
            padding: 2px 8px;
            font-weight: 500;
        }

        /* ── Modal ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(44,44,44,0.2);
            backdrop-filter: blur(6px);
            -webkit-backdrop-filter: blur(6px);
            z-index: 100;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--surface);
            border-radius: 24px;
            padding: 36px;
            width: 440px;
            max-width: 100%;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
            border: 1px solid var(--border);
            animation: modalIn 0.25s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from { opacity: 0; transform: scale(0.96) translateY(8px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal h3 {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 28px;
            letter-spacing: -0.3px;
        }

        .modal-field { margin-bottom: 18px; }

        .modal-field label {
            display: block;
            font-size: 0.72rem;
            font-weight: 600;
            color: var(--text-sub);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .modal-field input {
            width: 100%;
            padding: 14px 16px;
            border: 1.5px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            font-family: inherit;
            font-weight: 500;
            outline: none;
            background: var(--surface-alt);
            transition: all 0.2s;
            color: var(--text);
        }

        .modal-field input:focus {
            border-color: var(--accent);
            background: var(--surface);
            box-shadow: 0 0 0 4px var(--accent-soft);
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 28px;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border-radius: var(--radius-sm);
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.15s;
        }

        .btn-fill {
            background: var(--accent);
            color: #fff;
        }

        .btn-fill:hover { background: var(--accent-hover); }

        .btn-ghost {
            background: var(--surface-alt);
            color: var(--text);
            border: 1.5px solid var(--border);
        }

        .btn-ghost:hover { background: var(--border-light); }

        /* ── Day Detail ── */
        .day-detail {
            margin-top: 20px;
            max-height: 220px;
            overflow-y: auto;
        }

        .day-detail-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 14px;
            background: var(--surface-alt);
            border-radius: var(--radius-sm);
            margin-bottom: 8px;
            transition: background 0.15s;
        }

        .day-detail-item:hover { background: var(--border-light); }

        .day-detail-item .name {
            font-size: 0.88rem;
            font-weight: 600;
        }

        .day-detail-item .right {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .day-detail-item .amount {
            font-size: 0.88rem;
            font-weight: 700;
            color: var(--amber);
        }

        .day-detail-item .del-btn {
            width: 28px;
            height: 28px;
            border-radius: 8px;
            border: none;
            background: transparent;
            color: #c0c0c0;
            cursor: pointer;
            font-size: 0.85rem;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s;
        }

        .day-detail-item .del-btn:hover {
            background: var(--danger-soft);
            color: var(--danger);
        }

        .empty-msg {
            text-align: center;
            color: var(--text-sub);
            font-size: 0.88rem;
            padding: 20px 0;
            font-weight: 500;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            .app { padding: 32px 14px 60px; overflow-x: hidden; }
            .header { margin-bottom: 28px; }
            .logo { font-size: 1.4rem; }
            .hamburger { width: 44px; height: 44px; border-radius: 10px; }

            .settings-panel.open { max-height: 320px; }
            .settings-inner { padding: 16px; }
            .settings-grid { grid-template-columns: 1fr; gap: 12px; }

            .field label { font-size: 0.65rem; margin-bottom: 5px; }
            .field input { padding: 11px 14px; font-size: 0.9rem; }
            .field input[type="date"] { font-size: 0.85rem; padding: 10px 12px; }

            .summary-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 8px;
                margin-bottom: 24px;
            }

            .stat-card { padding: 16px 10px; overflow: hidden; }
            .stat-label { font-size: 0.6rem; margin-bottom: 6px; letter-spacing: 0.5px; }
            .stat-value { font-size: 1rem; word-break: break-all; }
            .progress-wrap { margin-top: 10px; height: 4px; }

            .cal-header { padding: 18px 16px; }
            .cal-title { font-size: 1rem; }
            .cal-nav button { width: 36px; height: 36px; font-size: 0.95rem; }
            .cal-nav .today-btn { padding: 0 12px; font-size: 0.75rem; }

            .cal-day { min-height: 72px; padding: 8px 8px; }
            .cal-day-label { padding: 10px 0; font-size: 0.58rem; }
            .day-num { font-size: 0.75rem; margin-bottom: 2px; }
            .day-total { font-size: 0.58rem; margin-bottom: 3px; }
            .day-chip { font-size: 0.52rem; padding: 2px 5px; border-radius: 5px; }
            .day-more { font-size: 0.5rem; padding: 1px 5px; }

            .modal { padding: 28px 24px; border-radius: 20px; }
            .modal h3 { font-size: 1.05rem; margin-bottom: 20px; }
            .modal-field { margin-bottom: 14px; }
            .modal-field input { padding: 12px 14px; font-size: 0.9rem; }
            .modal-actions { margin-top: 20px; gap: 10px; }
            .btn { padding: 12px; font-size: 0.85rem; }

            .day-detail-item { padding: 10px 12px; }
            .day-detail-item .name { font-size: 0.82rem; }
            .day-detail-item .amount { font-size: 0.82rem; }
        }

        @media (max-width: 380px) {
            .app { padding: 24px 10px 48px; }
            .summary-row { gap: 6px; }
            .stat-card { padding: 12px 8px; }
            .stat-value { font-size: 0.9rem; }
            .cal-day { min-height: 60px; padding: 6px 6px; }
            .day-chip { font-size: 0.48rem; padding: 2px 3px; }
            .settings-panel.open { max-height: 350px; }
            .settings-inner { padding: 14px; }
            .field input { padding: 10px 12px; font-size: 0.85rem; }
            .field input[type="date"] { font-size: 0.8rem; padding: 9px 10px; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <div class="logo">EZ Budget</div>
            <button class="hamburger" id="hamburgerBtn" onclick="toggleSettings()">
                <span></span><span></span><span></span>
            </button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <div class="settings-inner">
                <div class="settings-grid">
                    <div class="field">
                        <label>시작일</label>
                        <input type="date" id="startDate">
                    </div>
                    <div class="field">
                        <label>종료일</label>
                        <input type="date" id="endDate">
                    </div>
                    <div class="field">
                        <label>예산 (원)</label>
                        <input type="number" id="budget" placeholder="500000">
                    </div>
                </div>
            </div>
        </div>

        <div class="summary-row">
            <div class="stat-card">
                <div class="stat-label">예산</div>
                <div class="stat-value accent" id="totalBudget">₩0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">사용</div>
                <div class="stat-value red" id="totalSpent">₩0</div>
                <div class="progress-wrap">
                    <div class="progress-fill" id="progressBar" style="width:0%"></div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-label">잔여</div>
                <div class="stat-value green" id="totalRemaining">₩0</div>
            </div>
        </div>

        <div class="calendar-section">
            <div class="cal-header">
                <div class="cal-title" id="calTitle"></div>
                <div class="cal-nav">
                    <button onclick="changeMonth(-1)">‹</button>
                    <button class="today-btn" onclick="goToday()">오늘</button>
                    <button onclick="changeMonth(1)">›</button>
                </div>
            </div>
            <div class="cal-grid" id="calGrid"></div>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
        <div class="modal" onclick="event.stopPropagation()">
            <h3 id="modalTitle">지출 추가</h3>
            <div class="modal-field">
                <label>내용</label>
                <input type="text" id="expenseName" placeholder="점심, 교통비...">
            </div>
            <div class="modal-field">
                <label>금액 (원)</label>
                <input type="number" id="expenseAmount" placeholder="0">
            </div>
            <div class="day-detail" id="dayDetail"></div>
            <div class="modal-actions">
                <button class="btn btn-ghost" onclick="closeModal()">닫기</button>
                <button class="btn btn-fill" onclick="addExpense()">등록</button>
            </div>
        </div>
    </div>

    <script>
        let expenses = JSON.parse(localStorage.getItem('ezb_expenses') || '[]');
        let budget = parseFloat(localStorage.getItem('ezb_budget') || '0');
        let startDate = localStorage.getItem('ezb_start') || '';
        let endDate = localStorage.getItem('ezb_end') || '';
        let currentYear, currentMonth;
        let selectedDate = null;

        const today = new Date();
        currentYear = today.getFullYear();
        currentMonth = today.getMonth();

        document.getElementById('startDate').value = startDate;
        document.getElementById('endDate').value = endDate;
        document.getElementById('budget').value = budget || '';

        ['budget', 'startDate', 'endDate'].forEach(id => {
            document.getElementById(id).addEventListener('input', function() {
                if (id === 'budget') budget = parseFloat(this.value) || 0;
                if (id === 'startDate') startDate = this.value;
                if (id === 'endDate') endDate = this.value;
                localStorage.setItem('ezb_budget', budget);
                localStorage.setItem('ezb_start', startDate);
                localStorage.setItem('ezb_end', endDate);
                updateSummary();
                renderCalendar();
            });
        });

        function fmt(n) { return '₩' + n.toLocaleString('ko-KR'); }

        function toggleSettings() {
            const p = document.getElementById('settingsPanel');
            const h = document.getElementById('hamburgerBtn');
            p.classList.toggle('open');
            h.classList.toggle('open');
        }

        function changeMonth(delta) {
            currentMonth += delta;
            if (currentMonth > 11) { currentMonth = 0; currentYear++; }
            if (currentMonth < 0) { currentMonth = 11; currentYear--; }
            renderCalendar();
        }

        function goToday() {
            currentYear = today.getFullYear();
            currentMonth = today.getMonth();
            renderCalendar();
        }

        function getDaysInMonth(y, m) { return new Date(y, m + 1, 0).getDate(); }
        function getFirstDay(y, m) { return new Date(y, m, 1).getDay(); }

        function toDateStr(y, m, d) {
            return `${y}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        }

        function getExpensesForDate(dateStr) {
            return expenses.filter(e => e.date === dateStr);
        }

        function renderCalendar() {
            const months = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
            document.getElementById('calTitle').textContent = `${currentYear}년 ${months[currentMonth]}`;

            const grid = document.getElementById('calGrid');
            const days = ['일','월','화','수','목','금','토'];
            let html = days.map(d => `<div class="cal-day-label">${d}</div>`).join('');

            const totalDays = getDaysInMonth(currentYear, currentMonth);
            const firstDay = getFirstDay(currentYear, currentMonth);
            const prevDays = getDaysInMonth(currentYear, currentMonth - 1);
            const todayStr = toDateStr(today.getFullYear(), today.getMonth(), today.getDate());

            for (let i = 0; i < firstDay; i++) {
                const d = prevDays - firstDay + i + 1;
                const m = currentMonth === 0 ? 11 : currentMonth - 1;
                const y = currentMonth === 0 ? currentYear - 1 : currentYear;
                const ds = toDateStr(y, m, d);
                html += renderDayCell(d, ds, getExpensesForDate(ds), true);
            }

            for (let d = 1; d <= totalDays; d++) {
                const ds = toDateStr(currentYear, currentMonth, d);
                html += renderDayCell(d, ds, getExpensesForDate(ds), false, ds === todayStr);
            }

            const totalCells = firstDay + totalDays;
            const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            for (let i = 1; i <= remaining; i++) {
                const m = currentMonth === 11 ? 0 : currentMonth + 1;
                const y = currentMonth === 11 ? currentYear + 1 : currentYear;
                const ds = toDateStr(y, m, i);
                html += renderDayCell(i, ds, getExpensesForDate(ds), true);
            }

            grid.innerHTML = html;
            updateSummary();
        }

        function renderDayCell(day, dateStr, exs, isOther, isToday) {
            const total = exs.reduce((s, e) => s + e.amount, 0);
            const cls = ['cal-day'];
            if (isOther) cls.push('other-month');
            if (isToday) cls.push('today');
            if (dateStr === selectedDate) cls.push('selected');

            let chips = '';
            exs.slice(0, 2).forEach(e => {
                // chips += `<div class="day-chip" onclick="event.stopPropagation();openModal('${dateStr}')">${e.name}
                //     <span class="chip-del" onclick="event.stopPropagation();delExpense(${e.id})">×</span>
                //     </div>`;
                chips += `<div class="day-chip" onclick="event.stopPropagation();openModal('${dateStr}')">${e.name}</div>`;

            });
            if (exs.length > 2) chips += `<div class="day-more">+${exs.length - 2}건</div>`;

            return `<div class="${cls.join(' ')}" onclick="openModal('${dateStr}')">
                <div class="day-num">${day}</div>
                ${total > 0 ? `<div class="day-total">${fmt(total)}</div>` : ''}
                <div class="day-chips">${chips}</div>
            </div>`;
        }

        function openModal(dateStr) {
            selectedDate = dateStr;
            document.getElementById('modalTitle').textContent = `${dateStr} 지출`;
            document.getElementById('expenseName').value = '';
            document.getElementById('expenseAmount').value = '';
            document.getElementById('modalOverlay').classList.add('open');
            renderDayDetail(dateStr);
            setTimeout(() => document.getElementById('expenseName').focus(), 100);
        }

        function closeModal(e) {
            if (e && e.target !== document.getElementById('modalOverlay')) return;
            document.getElementById('modalOverlay').classList.remove('open');
            selectedDate = null;
            renderCalendar();
        }

        function renderDayDetail(dateStr) {
            const list = getExpensesForDate(dateStr);
            const el = document.getElementById('dayDetail');
            if (!list.length) {
                el.innerHTML = '<div class="empty-msg">등록된 지출이 없습니다.</div>';
                return;
            }
            el.innerHTML = list.map(e => `
                <div class="day-detail-item">
                    <span class="name">${e.name}</span>
                    <div class="right">
                        <span class="amount">${fmt(e.amount)}</span>
                        <button class="del-btn" onclick="delExpense(${e.id},'${dateStr}')">✕</button>
                    </div>
                </div>`).join('');
        }

        function addExpense() {
            if (!selectedDate) return;
            const name = document.getElementById('expenseName').value.trim();
            const amount = parseFloat(document.getElementById('expenseAmount').value);
            if (!name) return alert('내용을 입력해주세요.');
            if (!amount || amount <= 0) return alert('금액을 입력해주세요.');

            expenses.push({ id: Date.now(), name, amount, date: selectedDate });
            localStorage.setItem('ezb_expenses', JSON.stringify(expenses));
            document.getElementById('expenseName').value = '';
            document.getElementById('expenseAmount').value = '';
            renderDayDetail(selectedDate);
            renderCalendar();
        }

        function delExpense(id, dateStr) {
            expenses = expenses.filter(e => e.id !== id);
            localStorage.setItem('ezb_expenses', JSON.stringify(expenses));
            if (dateStr) renderDayDetail(dateStr);
            renderCalendar();
        }

        function updateSummary() {
            const filtered = expenses.filter(e => {
                if (!startDate || !endDate) return true;
                return e.date >= startDate && e.date <= endDate;
            });

            const totalSpent = filtered.reduce((s, e) => s + e.amount, 0);
            const remaining = budget - totalSpent;

            document.getElementById('totalBudget').textContent = fmt(budget);
            document.getElementById('totalSpent').textContent = fmt(totalSpent);

            const remEl = document.getElementById('totalRemaining');
            remEl.textContent = fmt(remaining);
            remEl.className = 'stat-value ' + (remaining >= 0 ? 'green' : 'red');

            const pct = budget > 0 ? Math.min((totalSpent / budget) * 100, 100) : 0;
            const bar = document.getElementById('progressBar');
            bar.style.width = pct + '%';
            bar.className = 'progress-fill' + (totalSpent > budget ? ' over' : '');
        }

        renderCalendar();
    </script>
</body>
</html>
